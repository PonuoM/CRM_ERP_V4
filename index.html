<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
  <link rel="shortcut icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
  <link rel="apple-touch-icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini ERP for Sales Teams</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Kanit', 'sans-serif'],
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(8px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
          animation: {
            fadeIn: 'fadeIn 0.2s ease-out',
          },
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Kanit', sans-serif;
    }

    /* Force paid amount status in OrderTable to show on a new line */
    .paid-break span>span {
      display: block;
    }

    /* Hide duplicate header cell immediately before paid-col */
    thead th:has(+ .paid-col) {
      display: none;
    }

    /* === React DatePicker Tailwind Overrides === */
    .react-datepicker-wrapper {
      width: 100%;
    }
    .react-datepicker-popper {
      z-index: 9999 !important;
    }
    .react-datepicker {
      font-family: 'Kanit', sans-serif !important;
      border: 1px solid #e2e8f0 !important;
      border-radius: 0.5rem !important;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1) !important;
    }
    .react-datepicker__header {
      background-color: #f8fafc !important;
      border-bottom: 1px solid #e2e8f0 !important;
      border-top-left-radius: 0.5rem !important;
      border-top-right-radius: 0.5rem !important;
      padding-top: 8px !important;
    }
    .react-datepicker__current-month, .react-datepicker-time__header, .react-datepicker-year-header {
      color: #1e293b !important;
      font-weight: 600 !important;
    }
    .react-datepicker__day-name {
      color: #64748b !important;
    }
    .react-datepicker__day {
      color: #334155;
    }
    .react-datepicker__day:hover {
      background-color: #e0e7ff !important;
      border-radius: 0.375rem !important;
    }
    .react-datepicker__day--selected, .react-datepicker__day--keyboard-selected {
      background-color: #4f46e5 !important;
      color: white !important;
      border-radius: 0.375rem !important;
      font-weight: bold;
    }
    .react-datepicker__time-container {
      border-left: 1px solid #e2e8f0 !important;
    }
    .react-datepicker__time-list-item {
      height: auto !important;
      padding: 8px 10px !important;
    }
    .react-datepicker__time-list-item:hover {
      background-color: #e0e7ff !important;
    }
    .react-datepicker__time-list-item--selected {
      background-color: #4f46e5 !important;
      color: white !important;
      font-weight: bold !important;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "react": "https://aistudiocdn.com/react@^19.1.1",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
        "react/": "https://aistudiocdn.com/react@^19.1.1/",
        "lucide-react": "https://aistudiocdn.com/lucide-react@^0.544.0",
        "react-dom": "https://aistudiocdn.com/react-dom@^19.1.1"
      }
    }
    </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
